model:
  type: Pi0Config
  max_token_len: 200
  pi05: true
  discrete_state_input: true
  enable_training_time_rtc: true
weight_loader:
  type: CheckpointWeightLoader
  params_path: gs://openpi-assets/checkpoints/pi05_base/params
ema_decay: null
data:
  type: LeRobotBiFlexivDataConfig
  repo_id: Xense/assemble_box_with_phone_stand0410_merged_fixed
  base_config:
    prompt_from_task: true
  default_prompt: Assemble the packaging by folding the flat box into shape, placing
    the metal phone stand inside, and closing the box properly.
batch_size: 256
num_workers: 64
num_train_steps: 80000
fsdp_devices: 8

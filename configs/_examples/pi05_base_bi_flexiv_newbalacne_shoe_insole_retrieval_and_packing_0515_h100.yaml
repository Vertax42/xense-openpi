model:
  type: Pi0Config
  max_token_len: 200
  pi05: true
  discrete_state_input: true
  enable_training_time_rtc: true
weight_loader:
  type: CheckpointWeightLoader
  params_path: gs://openpi-assets/checkpoints/pi05_base/params
ema_decay: null
data:
  type: LeRobotBiFlexivDataConfig
  repo_id: Xense/newbalance_shoe_insole_retrieval_and_packing0515
  base_config:
    prompt_from_task: true
  default_prompt: Open the shoe tongue, take the insole out of the shoe, put the insole
    back into the shoe, and pack the shoe into the shoebox.
batch_size: 256
num_workers: 64
num_train_steps: 40000
fsdp_devices: 8
